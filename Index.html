<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VSculpted | Luxury Body Sculpting</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<style>
:root {
  --cream: #fff1f5;
  --warm-white: #fffafd;
  --sand: #f1cbd6;
  --soft-pink: #e3a6ba;
  --rose: #c76f91;
  --deep: #070607;
  --charcoal: #171113;
  --text: #27151c;
  --muted: #8b6371;
  --white: #ffffff;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: "Jost", sans-serif;
  background: var(--warm-white);
  color: var(--text);
  overflow-x: hidden;
}

a {
  color: inherit;
}

/* NAV */
nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 22px 58px;
  transition: all 0.35s ease;
}

nav.scrolled {
  background: rgba(255, 250, 253, 0.94);
  border-bottom: 1px solid var(--sand);
  backdrop-filter: blur(12px);
}

.logo {
  font-family: "Cormorant Garamond", serif;
  font-size: 1.8rem;
  letter-spacing: 0.13em;
  text-decoration: none;
  color: var(--white);
  font-weight: 300;
}

nav.scrolled .logo {
  color: var(--deep);
}

.nav-links {
  display: flex;
  list-style: none;
  gap: 32px;
}

.nav-links a {
  text-decoration: none;
  font-size: 0.68rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.82);
  transition: color 0.3s ease;
}

nav.scrolled .nav-links a {
  color: var(--muted);
}

.nav-links a:hover {
  color: var(--soft-pink);
}

.nav-button {
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.5);
  color: var(--white);
  padding: 11px 24px;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

nav.scrolled .nav-button {
  color: var(--rose);
  border-color: var(--soft-pink);
}

.nav-button:hover {
  background: var(--soft-pink);
  color: var(--white) !important;
  border-color: var(--soft-pink);
}

/* HERO */
.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
  overflow: hidden;
  color: var(--white);
}

.hero-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to bottom, rgba(0,0,0,0.62), rgba(23,17,19,0.38), rgba(0,0,0,0.78)),
    url("https://images.unsplash.com/photo-1544161515-4ab6ce6db874?w=1800&q=80");
  background-size: cover;
  background-position: center;
  transform: scale(1.04);
  animation: slowZoom 7s ease forwards;
}

@keyframes slowZoom {
  to { transform: scale(1); }
}

.hero-content {
  position: relative;
  z-index: 2;
  max-width: 850px;
  animation: fadeUp 1s ease forwards;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(28px); }
  to { opacity: 1; transform: translateY(0); }
}

.eyebrow {
  display: block;
  color: var(--soft-pink);
  font-size: 0.68rem;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  margin-bottom: 22px;
}

.hero h1 {
  font-family: "Cormorant Garamond", serif;
  font-weight: 300;
  font-size: clamp(4rem, 9vw, 7.5rem);
  line-height: 0.95;
  letter-spacing: 0.04em;
  margin-bottom: 28px;
}

.hero h1 em {
  color: var(--soft-pink);
  font-style: italic;
}

.hero p {
  max-width: 700px;
  margin: 0 auto 46px;
  color: rgba(255,255,255,0.78);
  line-height: 1.8;
  letter-spacing: 0.11em;
  font-size: 0.92rem;
}

.button-row {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-primary,
.btn-secondary {
  display: inline-block;
  text-decoration: none;
  padding: 15px 38px;
  font-size: 0.68rem;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  transition: all 0.3s ease;
}

.btn-primary {
  background: var(--soft-pink);
  color: var(--white);
}

.btn-primary:hover {
  background: var(--rose);
}

.btn-secondary {
  border: 1px solid rgba(255,255,255,0.42);
  color: var(--white);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<nav id="navbar">
  <a href="#top" class="logo">VSculpted</a>

  <ul class="nav-links">
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#packages">Packages</a></li>
    <li><a href="#booking">Booking</a></li>
    <li><a href="#faq">FAQ</a></li>
  </ul>

  <a href="#booking" class="nav-button">Book Now</a>
</nav>

<header class="hero" id="top">
  <div class="hero-bg"></div>

  <div class="hero-content">
    <span class="eyebrow">Luxury Body Sculpting</span>

    <h1>VSculpted<br><em>Body Studio</em></h1>

    <p>
      Luxury body contouring designed for confidence, curves, and a soft sculpted glow.
    </p>

    <div class="button-row">
      <a href="#booking" class="btn-primary">Book Consultation</a>
      <a href="#services" class="btn-secondary">Explore Services</a>
    </div>
  </div>
</header>

<script>
const navbar = document.getElementById("navbar");

window.addEventListener("scroll", function () {
  navbar.classList.toggle("scrolled", window.scrollY > 60);
});
</script>

</body>
</html>
